name: E2E Prod Nightly

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for production regression'
        required: false
        default: 'https://inmosubastas.top'
  # Scheduled runs disabled 2026-07-12 pending go-live — see docs/CI_CONSOLIDATION_PLAN.md.
  # Readonly e2e against prod demo data has little value until there's real data.
  # RE-ENABLE AT GO-LIVE: restore `schedule:` with cron '30 2 * * *'.

jobs:
  e2e_prod:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_ADMIN_API_TOKEN: ${{ secrets.PLAYWRIGHT_ADMIN_API_TOKEN || secrets.ADMIN_API_TOKEN }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL || secrets.ADMIN_LOGIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD || secrets.ADMIN_LOGIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate admin E2E credentials
        run: |
          missing=0
          for name in PLAYWRIGHT_ADMIN_API_TOKEN PLAYWRIGHT_ADMIN_EMAIL PLAYWRIGHT_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for E2E auth coverage."
              missing=1
            fi
          done
          exit "$missing"

      - name: Set base URL
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ github.event.inputs.base_url }}" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BASE_URL=${{ vars.PROD_URL || 'https://inmosubastas.top' }}" >> "$GITHUB_ENV"
          fi

      - name: Run production history canary
        run: npm run test:e2e:history:canary

      - name: Run production shifts guard canary
        run: npm run test:e2e:shifts:guard:canary

      - name: Run production readonly regression
        run: npm run test:e2e:readonly

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-prod-${{ github.run_id }}
          path: test-results/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo "## E2E Prod Nightly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: history canary + shifts guard canary + readonly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base URL: $PLAYWRIGHT_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ID: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: playwright-report-prod-${{ github.run_id }}, junit-prod-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
