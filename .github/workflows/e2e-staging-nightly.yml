name: E2E Staging Nightly

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for staging regression'
        required: false
        default: 'https://staging.madridliveapp.top'
  # Scheduled runs disabled 2026-07-12 pending go-live — see docs/CI_CONSOLIDATION_PLAN.md.
  # Redundant with PR e2e + prod nightly; low value against staging demo data.
  # RE-ENABLE AT GO-LIVE: restore `schedule:` with cron '0 3 * * *'.

jobs:
  e2e_staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_ADMIN_API_TOKEN: ${{ secrets.PLAYWRIGHT_ADMIN_API_TOKEN || secrets.ADMIN_API_TOKEN }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL || secrets.ADMIN_LOGIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD || secrets.ADMIN_LOGIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate admin E2E credentials
        run: |
          missing=0
          for name in PLAYWRIGHT_ADMIN_API_TOKEN PLAYWRIGHT_ADMIN_EMAIL PLAYWRIGHT_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for E2E auth coverage."
              missing=1
            fi
          done
          exit "$missing"

      - name: Set base URL
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ github.event.inputs.base_url }}" >> "$GITHUB_ENV"
          elif [ -n "${{ vars.STAGING_URL }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ vars.STAGING_URL }}" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BASE_URL=https://staging.madridliveapp.top" >> "$GITHUB_ENV"
          fi

      - name: Preflight staging DNS
        run: |
          host=$(echo "$PLAYWRIGHT_BASE_URL" | sed -E 's#^[a-zA-Z]+://([^/:]+).*$#\1#')
          if [ -z "$host" ] || ! getent hosts "$host" >/dev/null 2>&1; then
            echo "SKIP_E2E_STAGING=true" >> "$GITHUB_ENV"
            echo "::warning::Skipping staging E2E because host is not resolvable: ${host:-unknown}"
          else
            echo "SKIP_E2E_STAGING=false" >> "$GITHUB_ENV"
          fi

      - name: Run staging history canary
        if: env.SKIP_E2E_STAGING != 'true'
        run: npm run test:e2e:history:canary

      - name: Run staging shifts guard canary
        if: env.SKIP_E2E_STAGING != 'true'
        run: npm run test:e2e:shifts:guard:canary

      - name: Run staging full regression
        if: env.SKIP_E2E_STAGING != 'true'
        run: npm run test:e2e

      - name: Skip notice
        if: env.SKIP_E2E_STAGING == 'true'
        run: |
          echo "Staging DNS unavailable for $PLAYWRIGHT_BASE_URL. E2E execution skipped by preflight."

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-staging-${{ github.run_id }}
          path: test-results/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo "## E2E Staging Nightly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: history canary + shifts guard canary + full" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base URL: $PLAYWRIGHT_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped: ${SKIP_E2E_STAGING:-false}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ID: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: playwright-report-staging-${{ github.run_id }}, junit-staging-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
