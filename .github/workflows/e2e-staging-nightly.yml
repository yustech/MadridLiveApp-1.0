name: E2E Staging Nightly

on:
  # Fixed UTC schedule; Madrid local time shifts by one hour with DST.
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for staging regression'
        required: false
        default: 'https://staging.madridliveapp.top'

jobs:
  e2e_staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_VIEWER_EMAIL: ${{ secrets.E2E_VIEWER_EMAIL }}
      PLAYWRIGHT_VIEWER_PASSWORD: ${{ secrets.E2E_VIEWER_PASSWORD_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate viewer E2E credentials
        run: |
          missing=0
          for name in PLAYWRIGHT_VIEWER_EMAIL PLAYWRIGHT_VIEWER_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for E2E auth coverage."
              missing=1
            fi
          done
          exit "$missing"

      - name: Set base URL
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ github.event.inputs.base_url }}" >> "$GITHUB_ENV"
          elif [ -n "${{ vars.STAGING_URL }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ vars.STAGING_URL }}" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BASE_URL=https://staging.madridliveapp.top" >> "$GITHUB_ENV"
          fi

      - name: Preflight staging DNS
        run: |
          host=$(echo "$PLAYWRIGHT_BASE_URL" | sed -E 's#^[a-zA-Z]+://([^/:]+).*$#\1#')
          if [ -z "$host" ] || ! getent hosts "$host" >/dev/null 2>&1; then
            echo "SKIP_E2E_STAGING=true" >> "$GITHUB_ENV"
            echo "::warning::Skipping staging E2E because host is not resolvable: ${host:-unknown}"
          else
            echo "SKIP_E2E_STAGING=false" >> "$GITHUB_ENV"
          fi

      - name: Capture pre-test database counts
        if: env.SKIP_E2E_STAGING != 'true'
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$PLAYWRIGHT_BASE_URL/api/mysql/health-count" > health-count-before.json

      - name: Run staging history canary
        if: env.SKIP_E2E_STAGING != 'true'
        run: npm run test:e2e:history:canary

      - name: Run staging readonly regression
        if: env.SKIP_E2E_STAGING != 'true'
        run: npm run test:e2e:readonly

      - name: Verify database counts are unchanged
        if: always() && env.SKIP_E2E_STAGING != 'true'
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$PLAYWRIGHT_BASE_URL/api/mysql/health-count" > health-count-after.json
          before=$(jq -ce '[.counts.staff, .counts.events, .counts.shifts, .counts.alerts] | select(all(.[]; type == "number"))' health-count-before.json)
          after=$(jq -ce '[.counts.staff, .counts.events, .counts.shifts, .counts.alerts] | select(all(.[]; type == "number"))' health-count-after.json)
          if [ "$before" != "$after" ]; then
            echo "::error::Nightly mutation tripwire detected changed database counts (staff/events/shifts/alerts): before=$before after=$after. Human review is required."
            echo "- Mutation tripwire: **FAILED** — before \`$before\`, after \`$after\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Mutation tripwire passed: database counts unchanged ($after)."
          echo "- Mutation tripwire: passed; staff/events/shifts/alerts unchanged at \`$after\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notice
        if: env.SKIP_E2E_STAGING == 'true'
        run: |
          echo "Staging DNS unavailable for $PLAYWRIGHT_BASE_URL. E2E execution skipped by preflight."

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-staging-${{ github.run_id }}
          path: test-results/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo "## E2E Staging Nightly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: history canary + readonly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base URL: $PLAYWRIGHT_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped: ${SKIP_E2E_STAGING:-false}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ID: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: playwright-report-staging-${{ github.run_id }}, junit-staging-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
