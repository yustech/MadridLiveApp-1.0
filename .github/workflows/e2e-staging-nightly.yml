name: E2E Staging Nightly

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for staging regression'
        required: false
        default: 'https://staging.inmosubastas.top'
  schedule:
    - cron: '0 3 * * *'

jobs:
  e2e_staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set base URL
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ github.event.inputs.base_url }}" >> "$GITHUB_ENV"
          elif [ -n "${{ vars.STAGING_URL }}" ]; then
            echo "PLAYWRIGHT_BASE_URL=${{ vars.STAGING_URL }}" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BASE_URL=https://staging.inmosubastas.top" >> "$GITHUB_ENV"
          fi

      - name: Run staging full regression
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-staging-${{ github.run_id }}
          path: test-results/junit.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          echo "## E2E Staging Nightly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: full" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base URL: $PLAYWRIGHT_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ID: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: playwright-report-staging-${{ github.run_id }}, junit-staging-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
