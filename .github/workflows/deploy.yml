name: Deploy

on:
  workflow_dispatch:
    inputs:
      publish_public_frontend:
        description: "Legacy/emergency only: publish static frontend to retired public_html"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
  workflow_call:
    inputs:
      publish_public_frontend:
        description: "Legacy/emergency only: publish static frontend to retired public_html"
        required: false
        default: "false"
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      DEPLOY_ALERT_WEBHOOK: ${{ secrets.DEPLOY_ALERT_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Shifts contract guard
        run: npm run guard:shifts:contract

      - name: Typecheck + Build
        run: npm run ci:check

      - name: Capture expected frontend bundle from dist
        id: expected_bundle
        run: |
          set -euo pipefail
          expected_bundle=$(grep -o "index-[A-Za-z0-9_-]*\\.js" dist/index.html | head -n 1)
          if [[ -z "$expected_bundle" ]]; then
            echo "Could not extract expected bundle from dist/index.html"
            exit 1
          fi
          echo "bundle=$expected_bundle" >> "$GITHUB_OUTPUT"

      - name: Refuse retired public_html publish mode
        if: ${{ inputs.publish_public_frontend == 'true' }}
        run: |
          echo "::error::publish_public_frontend=true is retired. Keep DEPLOY_PUBLIC_FRONTEND=false and serve the frontend through Node behind nginx."
          exit 1

      - name: Deploy to production
        id: deploy_step
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          REQUIRE_PUBLIC_HEALTH: "true"
          DEPLOY_PUBLIC_FRONTEND: ${{ inputs.publish_public_frontend }}
          PUBLIC_HTML_PATH: ${{ secrets.PUBLIC_HTML_PATH }}
          PUBLIC_FRONTEND_BACKUP_BASE: ${{ secrets.PUBLIC_FRONTEND_BACKUP_BASE }}
          STRICT_NO_FIREBASE: "true"
        run: |
          set -euo pipefail
          npm run deploy 2>&1 | tee deploy-step.log

      - name: Validate served bundle hash (post-deploy)
        id: served_bundle
        env:
          SITE_URL: ${{ secrets.DEPLOY_URL || 'https://www.madridliveapp.top' }}
        run: |
          set -euo pipefail
          expected='${{ steps.expected_bundle.outputs.bundle }}'
          served=$(curl -fsS "$SITE_URL" | grep -o "index-[A-Za-z0-9_-]*\\.js" | head -n 1)
          if [[ -z "$served" ]]; then
            echo "Could not detect served bundle from $SITE_URL"
            exit 1
          fi
          echo "bundle=$served" >> "$GITHUB_OUTPUT"
          if [[ "$served" != "$expected" ]]; then
            echo "Bundle mismatch: expected=$expected served=$served"
            exit 1
          fi

      - name: Upload deploy step log artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-step-log
          path: deploy-step.log
          if-no-files-found: warn

      - name: Write deploy summary
        if: ${{ always() }}
        env:
          EXPECTED_BUNDLE: ${{ steps.expected_bundle.outputs.bundle }}
          SERVED_BUNDLE: ${{ steps.served_bundle.outputs.bundle }}
          PUBLISH_PUBLIC_FRONTEND: ${{ inputs.publish_public_frontend }}
        run: |
          {
            echo "## Deploy Summary"
            echo ""
            echo "- Deploy step result: ${{ steps.deploy_step.outcome }}"
            echo "- publish_public_frontend: ${PUBLISH_PUBLIC_FRONTEND}"
            echo "- Expected bundle: ${EXPECTED_BUNDLE:-unknown}"
            echo "- Served bundle: ${SERVED_BUNDLE:-not_checked}"
            if [[ -f deploy-step.log ]]; then
              echo ""
              echo "### Deploy log tail"
              echo ""
              echo "```text"
              tail -n 40 deploy-step.log
              echo "```"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test production
        env:
          SITE_URL: ${{ secrets.DEPLOY_URL || 'https://www.madridliveapp.top' }}
          MIN_STAFF_COUNT: ${{ vars.PROD_MIN_STAFF_COUNT || vars.PROD_EXPECTED_STAFF_COUNT || '1' }}
          EXPECTED_COMMIT_SHA: ${{ github.sha }}
          SMOKE_CHECK_FRONTEND_BUNDLE: "true"
        run: npm run smoke:prod

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Production history canary
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.DEPLOY_URL || 'https://www.madridliveapp.top' }}
          PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL || secrets.ADMIN_LOGIN_EMAIL }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD || secrets.ADMIN_LOGIN_PASSWORD }}
        run: npm run test:e2e:history:canary
      - name: Record post-deploy functional gate
        run: |
          {
            echo ""
            echo "### Post-deploy functional gate"
            echo ""
            echo "- Smoke: passed"
            echo "- History canary: passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SMTP config diagnostics
        if: ${{ always() }}
        run: |
          missing=()
          [[ -z "$SMTP_HOST" ]] && missing+=("SMTP_HOST")
          [[ -z "$SMTP_USERNAME" ]] && missing+=("SMTP_USERNAME")
          [[ -z "$SMTP_PASSWORD" ]] && missing+=("SMTP_PASSWORD")
          [[ -z "$SMTP_FROM" ]] && missing+=("SMTP_FROM")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Email notifications disabled. Missing secrets: ${missing[*]}"
          else
            echo "SMTP configuration detected (host=$SMTP_HOST, port=$SMTP_PORT)."
          fi

      - name: Notify deploy success by email
        if: ${{ success() && env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.SMTP_FROM != '' }}
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Deploy OK - ${{ github.repository }}"
          to: "cyuste@gmail.com"
          from: ${{ env.SMTP_FROM }}
          body: |
            Deploy completed successfully.
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            publish_public_frontend: ${{ inputs.publish_public_frontend }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify deploy failure by email
        if: ${{ failure() && env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.SMTP_FROM != '' }}
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Deploy FAILED - ${{ github.repository }}"
          to: "cyuste@gmail.com"
          from: ${{ env.SMTP_FROM }}
          body: |
            Deploy failed.
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            publish_public_frontend: ${{ inputs.publish_public_frontend }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify deploy failure webhook
        if: ${{ failure() && env.DEPLOY_ALERT_WEBHOOK != '' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<EOF2
          {
            "text": "Deploy FAILED for ${{ github.repository }} on ${{ github.ref_name }}. Run: ${RUN_URL}"
          }
          EOF2
          )
          curl -fsS -X POST "$DEPLOY_ALERT_WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data "$payload"
