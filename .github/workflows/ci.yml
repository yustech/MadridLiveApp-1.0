name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Shifts contract guard
        run: npm run guard:shifts:contract

      - name: Build
        run: npm run build
      - name: Bundle size guardrail (non-blocking)
        run: |
          node <<'EOF2'
          const fs = require('fs');
          const path = require('path');

          const distDir = path.join(process.cwd(), 'dist', 'assets');
          const thresholdKB = Number(process.env.BUNDLE_WARN_THRESHOLD_KB || '260');
          const scannerThresholdKB = Number(process.env.BUNDLE_WARN_SCANNER_THRESHOLD_KB || '380');

          if (!fs.existsSync(distDir)) {
            console.log('::warning::Bundle guardrail skipped: dist/assets not found.');
            process.exit(0);
          }

          const files = fs.readdirSync(distDir)
            .filter((name) => name.endsWith('.js'))
            .map((name) => {
              const fullPath = path.join(distDir, name);
              const size = fs.statSync(fullPath).size;
              return { name, sizeKB: size / 1024 };
            })
            .sort((a, b) => b.sizeKB - a.sizeKB);

          if (files.length === 0) {
            console.log('::warning::Bundle guardrail skipped: no JS assets found.');
            process.exit(0);
          }

          const top = files.slice(0, 5);
          console.log('Top 5 JS assets by size:');
          for (const asset of top) {
            console.log(`- ${asset.name}: ${asset.sizeKB.toFixed(2)} KB`);
          }

          const scannerChunks = files.filter((asset) => asset.name.startsWith('scanner-vendor-'));
          const nonScannerChunks = files.filter((asset) => !asset.name.startsWith('scanner-vendor-'));

          const largestNonScanner = nonScannerChunks[0];
          if (largestNonScanner && largestNonScanner.sizeKB > thresholdKB) {
            console.log(`::warning::Largest non-scanner JS asset ${largestNonScanner.name} is ${largestNonScanner.sizeKB.toFixed(2)} KB (threshold ${thresholdKB} KB).`);
          } else {
            const ref = largestNonScanner || files[0];
            console.log(`Largest non-scanner JS asset ${ref.name} is ${ref.sizeKB.toFixed(2)} KB (<= ${thresholdKB} KB threshold).`);
          }

          const largestScanner = scannerChunks[0];
          if (largestScanner) {
            if (largestScanner.sizeKB > scannerThresholdKB) {
              console.log(`::warning::Scanner JS asset ${largestScanner.name} is ${largestScanner.sizeKB.toFixed(2)} KB (scanner threshold ${scannerThresholdKB} KB).`);
            } else {
              console.log(`Scanner JS asset ${largestScanner.name} is ${largestScanner.sizeKB.toFixed(2)} KB (<= ${scannerThresholdKB} KB scanner threshold).`);
            }
          }
          EOF2
        env:
          BUNDLE_WARN_THRESHOLD_KB: ${{ vars.BUNDLE_WARN_THRESHOLD_KB || '260' }}
          BUNDLE_WARN_SCANNER_THRESHOLD_KB: ${{ vars.BUNDLE_WARN_SCANNER_THRESHOLD_KB || '380' }}
  shifts_integrity:
    name: Shifts integrity gate (blocking)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root-password
          MYSQL_DATABASE: madrid_live_ci
          MYSQL_USER: madridlive
          MYSQL_PASSWORD: madridlive
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -umadridlive -pmadridlive"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    outputs:
      gate_failed: ${{ steps.gate_status.outputs.failed }}
    env:
      # Shifts integrity e2e ALWAYS runs against an isolated local app instance
      # (built + seeded fresh below), on both pull_request and push-to-main.
      # It must NOT target a deployed environment: doing so used to run these
      # data-mutating tests against live production and left QA fixtures in the
      # prod DB. Production health is covered by the systemd watchdog, smoke:prod,
      # and the nightly e2e workflows instead.
      INTEGRITY_LOCAL_BASE_URL: http://127.0.0.1:5173
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
      API_BASE_URL: http://127.0.0.1:5173
      ADMIN_API_TOKEN: ${{ secrets.PLAYWRIGHT_ADMIN_API_TOKEN || secrets.ADMIN_API_TOKEN }}
      ADMIN_LOGIN_EMAIL: ${{ secrets.ADMIN_LOGIN_EMAIL }}
      ADMIN_LOGIN_PASSWORD: ${{ secrets.ADMIN_LOGIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET || secrets.ADMIN_API_TOKEN }}
      PLAYWRIGHT_ADMIN_API_TOKEN: ${{ secrets.PLAYWRIGHT_ADMIN_API_TOKEN || secrets.ADMIN_API_TOKEN }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL || secrets.ADMIN_LOGIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD || secrets.ADMIN_LOGIN_PASSWORD }}
      REQUIRE_DELETE_STAFF_AUTH: ${{ vars.REQUIRE_DELETE_STAFF_AUTH || 'true' }}
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: madrid_live_ci
      MYSQL_USER: madridlive
      MYSQL_PASSWORD: madridlive

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate admin integrity credentials
        run: |
          missing=0
          for name in ADMIN_API_TOKEN PLAYWRIGHT_ADMIN_API_TOKEN PLAYWRIGHT_ADMIN_EMAIL PLAYWRIGHT_ADMIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for shifts integrity coverage."
              missing=1
            fi
          done
          exit "$missing"

      - name: Build local integrity app
        run: npm run build

      - name: Start local integrity app
        run: |
          DISABLE_HMR=true PORT=5173 NODE_ENV=development npm start > /tmp/madridlive-shifts-integrity.log 2>&1 &
          echo "$!" > /tmp/madridlive-shifts-integrity.pid

          for attempt in {1..60}; do
            if curl -fsS "$INTEGRITY_LOCAL_BASE_URL/api/health" >/dev/null; then
              echo "Local shifts integrity app is healthy."
              exit 0
            fi
            sleep 2
          done

          echo "::error::Local shifts integrity app did not become healthy."
          cat /tmp/madridlive-shifts-integrity.log
          exit 1

      - name: Seed local integrity MySQL fixture
        run: |
          reset_response=$(mktemp)
          reset_status=$(curl -sS -o "$reset_response" -w "%{http_code}" \
            -X POST \
            -H "x-admin-token: $ADMIN_API_TOKEN" \
            "$INTEGRITY_LOCAL_BASE_URL/api/mysql/reset-initial")

          if [[ "$reset_status" -lt 200 || "$reset_status" -ge 300 ]]; then
            echo "reset-initial failed with HTTP $reset_status"
            sed -n '1,200p' "$reset_response"
            exit 1
          fi

          curl -fsS "$INTEGRITY_LOCAL_BASE_URL/api/mysql/health-count" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const payload=JSON.parse(s); const count=Number(payload?.counts?.staff ?? payload?.staffCount ?? 0); if (!Number.isFinite(count) || count <= 0) { throw new Error('Local integrity fixture has no staff rows.'); } console.log('staff_count=' + count);});"

      - name: Run shifts API regression
        id: api_regression
        run: npm run test:api:shifts:regression

      - name: Run full e2e suite
        id: e2e_suite
        # Full Playwright suite (phase1-core, phase1-business-edges, regression)
        # against the isolated local harness. Consolidated here from the former
        # e2e-regression.yml, which ran the same suite on the same harness.
        run: npm run test:e2e

      - name: Stop local integrity app
        if: ${{ always() }}
        run: |
          if [ -f /tmp/madridlive-shifts-integrity.pid ]; then
            kill "$(cat /tmp/madridlive-shifts-integrity.pid)" 2>/dev/null || true
          fi

      - name: Upload local integrity server log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: shifts-integrity-server-log
          path: /tmp/madridlive-shifts-integrity.log
          if-no-files-found: ignore

      - name: Capture shifts integrity outcome
        if: ${{ always() }}
        id: gate_status
        run: |
          if [[ "${{ steps.api_regression.outcome }}" == "failure" || "${{ steps.e2e_suite.outcome }}" == "failure" ]]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

  notify_shifts_integrity_failure:
    name: Notify shifts integrity failure
    runs-on: ubuntu-latest
    needs: shifts_integrity
    if: ${{ always() && needs.shifts_integrity.outputs.gate_failed == 'true' }}
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      DEPLOY_ALERT_WEBHOOK: ${{ secrets.DEPLOY_ALERT_WEBHOOK }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: SMTP config diagnostics
        run: |
          missing=()
          [[ -z "$SMTP_HOST" ]] && missing+=("SMTP_HOST")
          [[ -z "$SMTP_USERNAME" ]] && missing+=("SMTP_USERNAME")
          [[ -z "$SMTP_PASSWORD" ]] && missing+=("SMTP_PASSWORD")
          [[ -z "$SMTP_FROM" ]] && missing+=("SMTP_FROM")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Email notification disabled for shifts integrity failure. Missing secrets: ${missing[*]}"
          else
            echo "SMTP configuration detected (host=$SMTP_HOST, port=$SMTP_PORT)."
          fi

      - name: Notify shifts integrity failure by email
        if: ${{ env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.SMTP_FROM != '' }}
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "CI SHIFTS INTEGRITY FAILED - ${{ github.repository }}"
          to: "cyuste@gmail.com"
          from: ${{ env.SMTP_FROM }}
          body: |
            The non-blocking shifts integrity gate failed.
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run URL: ${{ env.RUN_URL }}

      - name: Notify shifts integrity failure webhook
        if: ${{ env.DEPLOY_ALERT_WEBHOOK != '' }}
        run: |
          payload=$(cat <<EOF2
          {
            "text": "CI SHIFTS INTEGRITY FAILED for ${{ github.repository }} on ${{ github.ref_name }} at ${{ github.sha }}. Run: ${RUN_URL}"
          }
          EOF2
          )
          curl -fsS -X POST "$DEPLOY_ALERT_WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data "$payload"
