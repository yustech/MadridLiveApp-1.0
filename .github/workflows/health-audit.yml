name: Health Audit

on:
  schedule:
    # 09:00 Europe/Madrid year-round (DST-safe):
    # - 07:00 UTC when Madrid is UTC+2 (summer)
    # - 08:00 UTC when Madrid is UTC+1 (winter)
    - cron: "0 7 * * 1"
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: production-health-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.DEPLOY_URL || 'https://inmosubastas.top' }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}

    steps:
      - name: Gate schedule to 09:00 Europe/Madrid
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          madrid_time=$(TZ=Europe/Madrid date '+%H:%M')
          if [[ "$madrid_time" == "09:00" ]]; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
            echo "Running scheduled audit at Madrid local time: $madrid_time"
          else
            echo "run_audit=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this UTC slot; Madrid local time is $madrid_time"
          fi

      - name: Check health endpoint
        if: ${{ steps.gate.outputs.run_audit == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL%/}"
          if [[ "$url" == *"/api/health" ]]; then
            health_url="$url"
          elif [[ "$url" == *"/api" ]]; then
            health_url="$url/health"
          else
            health_url="$url/api/health"
          fi

          echo "Checking $health_url"
          response=$(curl --connect-timeout 5 --max-time 10 -fsS "$health_url")
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Check version endpoint
        if: ${{ steps.gate.outputs.run_audit == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL%/}"
          if [[ "$url" == *"/api/version" ]]; then
            version_url="$url"
          elif [[ "$url" == *"/api" ]]; then
            version_url="$url/version"
          else
            version_url="$url/api/version"
          fi

          echo "Checking $version_url"
          response=$(curl --connect-timeout 5 --max-time 10 -fsS "$version_url")
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Notify health audit failure by email
        if: ${{ steps.gate.outputs.run_audit == 'true' && failure() && env.SMTP_HOST != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.SMTP_FROM != '' }}
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Health Audit FAILED - ${{ github.repository }}"
          to: "cyuste@gmail.com"
          from: ${{ env.SMTP_FROM }}
          body: |
            Weekly/manual health audit failed.
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Base URL: ${{ env.BASE_URL }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
